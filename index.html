<!DOCTYPE html>

  <body>
    <div id="page-container">
      <header>
        <div class="container">
          <div class="row">
            <div class="col">
              <div class="header__container"><span class="logo">Greta</span>
                <div class="menu" role="button">
                  <div class="menu__open">🍔</div>
                  <div class="menu__closed">❌</div>

                <nav id="nav-primary">
                  <ul>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>

              </div>

      <div id="nav-mobile">
        <ul>
          <li><a href="#work">Work</a></li>
